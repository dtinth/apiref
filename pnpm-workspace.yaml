  hast-util-to-html: ^9.0.5
  htm: ^3.1.1
  html-to-text: ^9.0.5
  lit: ^3.3.2
  marked: ^17.0.5
  pacote: ^21.5.0
  parse5-html-rewriting-stream: ^8.0.0
  preact: ^10.29.0
  preact-render-to-string: ^6.6.6
