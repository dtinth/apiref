name: Deploy to GitHub Pages

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build shell assets
        working-directory: packages/shell
        run: vp build

      - name: Build renderer CLI
        working-directory: packages/renderer
        run: vp pack

      - name: Generate TypeDoc JSON
        run: |
          vp exec typedoc \
            --entryPoints packages/renderer/src/index.ts \
            --tsconfig packages/renderer/tsconfig.json \
            --json typedoc.json

      - name: Generate API reference HTML
        run: |
          node packages/renderer/dist/cli.mjs typedoc.json \
            --out _site \
            --assets-base https://dtinth.github.io/apiref/assets

      - name: Copy shell assets
        run: |
          mkdir -p _site/assets
          cp packages/shell/dist/shell.js _site/assets/
          cp packages/shell/dist/styles.css _site/assets/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
