name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: Build project
        run: vp run build -r

      - name: Generate TypeDoc JSON
        run: vp run generate-fixture

      - name: Generate API reference HTML
        run: |
          node packages/renderer/dist/cli.mjs packages/renderer/fixtures/examples.json \
            --out _site \
            --assets-base https://cdn.apiref.page/assets

      - name: Copy shell assets
        run: |
          mkdir -p _site/assets
          cp -rv packages/shell/dist/* _site/assets/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
